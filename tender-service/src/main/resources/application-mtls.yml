# =====================================================================
# Profil « mtls » du tender-service — TLS mutuel entrant (Zero Trust)
# Le service n'accepte QUE des clients présentant un certificat signé par la CA.
# Activation : SPRING_PROFILES_ACTIVE=mtls (+ montage de /certs)
# =====================================================================
server:
  port: 8081
  ssl:
    enabled: true
    key-store: file:/certs/tender-service.p12
    key-store-password: ${MTLS_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: tender-service
    # Truststore = CA : valide le certificat client (le Gateway).
    trust-store: file:/certs/truststore.p12
    trust-store-password: ${MTLS_PASSWORD:changeit}
    trust-store-type: PKCS12
    client-auth: need            # mTLS : certificat client OBLIGATOIRE
    protocol: TLS
    enabled-protocols: TLSv1.3,TLSv1.2