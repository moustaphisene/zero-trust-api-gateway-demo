# =====================================================================
# Pipeline CI/CD sécurisé (DevSecOps)
# Couvre : sécurité de la chaîne CI/CD, gestion des secrets, observabilité
# Étapes : build → tests → SAST → SCA (dépendances) → secret scan → image scan
# =====================================================================
name: ci-secure

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # pour publier les SARIF dans l'onglet Security

jobs:
  build-and-test:
    name: Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Tests (unitaires + slice + intégration Testcontainers)
        run: mvn -B -ntp verify

  sast:
    name: SAST — analyse statique (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - uses: github/codeql-action/init@v3
        with: { languages: java }
      - run: mvn -B -ntp clean package -DskipTests
      - uses: github/codeql-action/analyze@v3

  sca:
    name: SCA — vulnérabilités des dépendances (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy — scan du système de fichiers (dépendances Maven)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Publier le rapport SCA
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy-fs.sarif }

  secret-scan:
    name: Détection de secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image-scan:
    name: Build & scan des images Docker
    runs-on: ubuntu-latest
    needs: [ build-and-test ]
    strategy:
      matrix:
        service: [ gateway, tender-service, user-service ]
    steps:
      - uses: actions/checkout@v4
      - name: Build image ${{ matrix.service }}
        run: docker build -f ${{ matrix.service }}/Dockerfile -t local/${{ matrix.service }}:ci .
      - name: Trivy — scan de l'image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  sbom:
    name: SBOM — inventaire des composants (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - name: Générer le SBOM (CycloneDX, lié à la phase package)
        run: mvn -B -ntp -DskipTests package
      - name: Publier les SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: '**/target/classes/META-INF/sbom/application.cdx.json'

  supply-chain:
    name: Signature d'images & attestation SBOM (cosign keyless)
    runs-on: ubuntu-latest
    needs: [ build-and-test ]
    # Uniquement sur push (les PR ne poussent pas d'image).
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write        # push vers GHCR
      id-token: write        # OIDC pour cosign keyless (Sigstore)
    strategy:
      matrix:
        service: [ gateway, tender-service, user-service ]
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.service }}
        id: build
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          docker build -f ${{ matrix.service }}/Dockerfile -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:${{ github.sha }}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE:${{ github.sha }}")
          echo "ref=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: SBOM de l'image (syft, CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.build.outputs.ref }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json
      - name: Signer l'image (cosign keyless)
        run: cosign sign --yes "${{ steps.build.outputs.ref }}"
      - name: Attester le SBOM à l'image (provenance)
        run: cosign attest --yes --type cyclonedx --predicate sbom-${{ matrix.service }}.cdx.json "${{ steps.build.outputs.ref }}"